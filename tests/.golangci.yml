#
# golangci-lint config for the integration test suite.
# Format: golangci-lint v2 (matches the binary pinned in
# .github/workflows/golangci-lint.yaml — keep the two in sync).

version: "2"

run:
  build-tags:
    - integration

linters:
  default: standard
  settings:
    errcheck:
      # In tests, deferred Body.Close() return values are conventionally
      # ignored — the response is already consumed by the assertion above
      # the defer, and a Close error in test cleanup is not actionable.
      # io.Closer covers http.Response.Body (an io.ReadCloser).
      exclude-functions:
        - (io.Closer).Close
