name: openchami-sandbox

networks:
  default:
    name: openchami-sandbox

services:
  vault:
    image: ${SBX_VAULT_IMAGE:-hashicorp/vault:1.21}
    container_name: sandbox-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: warn
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: ${SBX_LOCALSTACK_IMAGE:-localstack/localstack:3}
    container_name: sandbox-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack
    ports:
      - "127.0.0.1:4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: ${SBX_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: sandbox-postgres
    environment:
      POSTGRES_USER: openchami
      POSTGRES_PASSWORD: openchami
      POSTGRES_DB: openchami
    volumes:
      - ../fixtures/pg-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openchami -d openchami"]
      interval: 5s
      timeout: 3s
      retries: 30
