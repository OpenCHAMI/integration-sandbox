  # ──────────────────────────────────────────────────────────────────────────
  # Teardown: always run, cleanup containers
  # ──────────────────────────────────────────────────────────────────────────
  teardown:
    name: Teardown
    needs: [test-uc1, test-uc2, test-uc3, test-uc4, test-uc5, test-uc6, test-uc7]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop and remove all containers
        run: bash scripts/down.sh || true

      - name: Show final Docker state
        if: always()
        run: |
          docker ps -a
          docker network ls
