#
# OpenCHAMI Integration Sandbox CI
#
# Each UC job is self-contained: it brings up the stack via scripts/up.sh,
# seeds fixtures, runs its tests, captures artifacts, and tears down.
# GitHub-hosted runners are ephemeral and don't share Docker state across
# jobs, so the old infra-up / bmc-sim-up / core-up / seed / teardown jobs
# (b4c74c7) couldn't carry state forward and have been removed.
#
# UC1-UC7 are emitted by a single `test-uc` matrix job. Per-UC GitHub
# status checks are preserved (each appears as "test-uc (uc<N>)"), but the
# 7 UCs run in parallel after test-bats instead of chained — wall-clock for
# the UC stage drops from ~7×5min to ~5min for the same billed minutes.
#
# The workflow exposes:
# - SKIP_SIM: skip building/starting ipmi-sim and remote-console (default: true)
# - SBX_*_IMAGE: override any service image (e.g., for PR builds)
# - IMAGES: manifest selection (release | default | edge | release-v1.0)

name: ci

on:
  # Auto-trigger only when an image manifest changes. The harness itself
  # (scripts, fixtures, compose, tests) doesn't get re-run on every push
  # because the test surface is the image set — code changes can be
  # validated with workflow_dispatch when needed.
  push:
    branches: [main]
    paths:
      - "images/**.env"
  pull_request:
    paths:
      - "images/**.env"
  workflow_dispatch:
    inputs:
      images:
        description: "Manifest under images/ (default | release | edge | release-v1.0)"
        type: string
        default: "default"
      skip_sim:
        description: "Skip building and starting ipmi-sim / remote-console"
        type: boolean
        default: true
      sbx_vault_image:
        description: "Override Vault image"
        type: string
        default: ""
      sbx_localstack_image:
        description: "Override LocalStack image"
        type: string
        default: ""
      sbx_postgres_image:
        description: "Override Postgres image"
        type: string
        default: ""
      sbx_sushy_image:
        description: "Override sushy-tools (Redfish emulator) image"
        type: string
        default: ""
      sbx_ipmi_sim_image:
        description: "Override ipmi_sim image"
        type: string
        default: ""
      sbx_smd_image:
        description: "Override SMD image"
        type: string
        default: ""
      sbx_tokensmith_image:
        description: "Override tokensmith image"
        type: string
        default: ""
      sbx_boot_image:
        description: "Override boot-service image"
        type: string
        default: ""
      sbx_metadata_image:
        description: "Override metadata-service image"
        type: string
        default: ""
      sbx_fru_image:
        description: "Override fru-tracker image"
        type: string
        default: ""
      sbx_power_image:
        description: "Override power-control image"
        type: string
        default: ""
      sbx_magellan_image:
        description: "Override magellan-runner image"
        type: string
        default: ""

permissions:
  contents: read
  packages: read

env:
  IMAGES: ${{ inputs.images || 'default' }}
  SKIP_SIM: ${{ inputs.skip_sim || 'true' }}
  SBX_VAULT_IMAGE: ${{ inputs.sbx_vault_image }}
  SBX_LOCALSTACK_IMAGE: ${{ inputs.sbx_localstack_image }}
  SBX_POSTGRES_IMAGE: ${{ inputs.sbx_postgres_image }}
  SBX_SUSHY_IMAGE: ${{ inputs.sbx_sushy_image }}
  SBX_IPMI_SIM_IMAGE: ${{ inputs.sbx_ipmi_sim_image }}
  SBX_SMD_IMAGE: ${{ inputs.sbx_smd_image }}
  SBX_TOKENSMITH_IMAGE: ${{ inputs.sbx_tokensmith_image }}
  SBX_BOOT_IMAGE: ${{ inputs.sbx_boot_image }}
  SBX_METADATA_IMAGE: ${{ inputs.sbx_metadata_image }}
  SBX_FRU_IMAGE: ${{ inputs.sbx_fru_image }}
  SBX_POWER_IMAGE: ${{ inputs.sbx_power_image }}
  SBX_MAGELLAN_IMAGE: ${{ inputs.sbx_magellan_image }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Setup: validate prerequisites, resolve image manifest
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: tests/go.mod
          cache: true
          cache-dependency-path: tests/go.sum

      - name: Install host-side tools (vault, bats)
        uses: ./.github/actions/setup-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
        continue-on-error: true

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Show resolved image manifest
        run: make show-images

  # ──────────────────────────────────────────────────────────────────────────
  # Build: pull/build images (respects SKIP_SIM)
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build/pull images
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
        continue-on-error: true

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build/pull images
        run: bash scripts/build-images.sh

  # ──────────────────────────────────────────────────────────────────────────
  # BATS smoke tests (run before integration tests per existing convention)
  # ──────────────────────────────────────────────────────────────────────────
  test-bats:
    name: BATS smoke tests
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install host-side tools (vault, bats)
        uses: ./.github/actions/setup-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
        continue-on-error: true

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Bring up stack + seed
        run: |
          bash scripts/build-images.sh
          bash scripts/up.sh
          bash fixtures/vault-seed.sh
          bash fixtures/s3-buckets.sh
          bash fixtures/seed-smd.sh
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://127.0.0.1:4566

      - name: Run BATS tests
        run: bats tests/bats/

      - name: Capture logs on failure
        if: failure()
        run: bash scripts/log-bundle.sh bats-failure

      - name: Upload BATS logs on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bats-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash scripts/down.sh || true

  # ──────────────────────────────────────────────────────────────────────────
  # UC1-UC7: integration use cases.
  #
  # One job, seven matrix entries. Each entry runs on its own runner with a
  # fresh stack bring-up, so all 7 UCs execute in parallel after test-bats.
  # `fail-fast: false` lets every UC complete even if one fails — useful
  # for diagnosis. Per-UC metadata (label, timeouts, services/assertions
  # blurbs for $GITHUB_STEP_SUMMARY, doc link) lives in matrix.include
  # so adding or tweaking a UC is one block, not 90 lines of copy-paste.
  # ──────────────────────────────────────────────────────────────────────────
  test-uc:
    name: "${{ matrix.label }}"
    needs: test-bats
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: uc1
            label: "UC1: Node visibility"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC1_'
            services: "SMD, boot-service, metadata-service"
            assertions: "Populate SMD with nodes; node visibility chain through boot/metadata, with cloud-init lookup."
            doc: uc1-node-visibility.md
          - id: uc2
            label: "UC2: Multi-cluster"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC2_'
            services: "boot-service, metadata-service"
            assertions: "Two clusters with disjoint node sets; move a node between them; membership reflects on both services."
            doc: uc2-multi-cluster.md
          - id: uc3
            label: "UC3: Restart resilience"
            timeout: 30
            go_timeout: 15m
            test_re: '^TestUC3_'
            services: "All 9 services"
            assertions: "Restart each container in turn (k8s-style); re-confirm node visibility and cross-service health."
            doc: uc3-restart-resilience.md
          - id: uc4
            label: "UC4: Tokensmith + SMD"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC4_'
            services: "tokensmith, SMD"
            assertions: "RFC 8693 bootstrap-token mint + token exchange; JWKS signature verification; authenticated SMD write round-trips through postgres."
            doc: uc4-tokensmith-smd.md
          - id: uc5
            label: "UC5: Magellan scan"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC5_'
            services: "magellan, sushy-tools, SMD"
            assertions: "Run the documented magellan scan → collect → send pipeline against the 8 BMC sims; verify SMD's /Inventory/RedfishEndpoints reflects the discovered fleet."
            doc: uc5-magellan-scan.md
          - id: uc6
            label: "UC6: Power control"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC6_'
            services: "power-control, SMD, sushy-tools"
            assertions: "POST a force-off/on transition; observe PowerState mutation on the BMC sim via an independent Redfish read; reverse and re-verify."
            doc: uc6-power-redfish.md
          - id: uc7
            label: "UC7: FRU discovery"
            timeout: 20
            go_timeout: 10m
            test_re: '^TestUC7_'
            services: "fru-tracker"
            assertions: "POST a 32-device discovery snapshot (8 nodes × CPU + 2 DIMMs); poll until reconciler completes; verify parent/child UID linkage in the device tree."
            doc: uc7-fru-discovery.md
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: tests/go.mod
          cache: true
          cache-dependency-path: tests/go.sum

      - name: Install host-side tools (vault, bats)
        uses: ./.github/actions/setup-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
        continue-on-error: true

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Bring up stack + seed
        run: |
          bash scripts/build-images.sh
          bash scripts/up.sh
          bash fixtures/vault-seed.sh
          bash fixtures/s3-buckets.sh
          bash fixtures/seed-smd.sh
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://127.0.0.1:4566

      - name: "Run ${{ matrix.label }} tests"
        working-directory: tests
        env:
          UC_LOG: ${{ runner.temp }}/${{ matrix.id }}.log
        run: |
          go test -tags integration -count=1 -v -timeout ${{ matrix.go_timeout }} -run '${{ matrix.test_re }}' ./integration/... 2>&1 | tee "$UC_LOG"

      # Pass matrix values via env so the shell never tries to interpret
      # backticks or other punctuation that may appear in the assertions
      # blurb. Inline `${{ }}` substitution into the script body would.
      - name: Generate test report
        if: always()
        env:
          UC_LABEL: ${{ matrix.label }}
          UC_SERVICES: ${{ matrix.services }}
          UC_ASSERTIONS: ${{ matrix.assertions }}
          UC_DOC: ${{ matrix.doc }}
          UC_LOG: ${{ runner.temp }}/${{ matrix.id }}.log
        run: |
          {
            echo "## $UC_LABEL"
            echo ""
            echo "**Services:** $UC_SERVICES"
            echo ""
            if [ -f "$UC_LOG" ]; then
              if grep -q "PASS" "$UC_LOG"; then
                echo "✅ **Status:** PASSED"
              else
                echo "❌ **Status:** FAILED"
              fi
              echo ""
              echo "**Assertions:** $UC_ASSERTIONS"
              echo ""
              echo "📄 [Use case documentation](../blob/main/docs/use-cases/$UC_DOC)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture logs on failure
        if: failure()
        run: bash scripts/log-bundle.sh ${{ matrix.id }}-failure

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.id }}-logs-${{ github.run_id }}
          path: |
            logs/
            ${{ runner.temp }}/${{ matrix.id }}.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Teardown
        if: always()
        run: bash scripts/down.sh || true
