#
# This workflow runs the sandbox against itself on every PR, on every
# push to main, and daily.
#
# PRs + pushes use `IMAGES=release` so Renovate's bump PRs (which
# edit images/release.env) actually exercise the freshly-pinned tags.
# The daily cron additionally runs `IMAGES=edge` to catch upstream
# :main drift before it lands in a release tag.
#
# Consumer repos that want to exercise their own PR build through this
# harness should copy sandbox-consumer.example.yaml instead.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily 06:00 UTC. Drift detection against floating tags.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      images:
        description: "Manifest under images/ (release | default | edge | release-v1.0)"
        type: string
        default: "release"

permissions:
  contents: read
  packages: read

jobs:
  # Pinned (release.env) — the normal CI gate. Every event triggers
  # this; for workflow_dispatch the input selects which manifest.
  ci-release:
    name: ci (${{ inputs.images || 'release' }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tests/go.mod

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: make ci
        env:
          IMAGES: ${{ inputs.images || 'release' }}
        run: make ci

      - name: Upload log bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-logs-${{ inputs.images || 'release' }}-${{ github.run_id }}
          path: logs/
          retention-days: 7

  # Floating (edge.env) — only runs on cron. We don't gate PRs on this
  # because upstream :main pushes regularly enough that we'd be red
  # most days for reasons unrelated to the PR under review. The
  # scheduled run posts to Issues automatically (via the action's
  # default failure summary) so drift is still visible.
  ci-edge-drift:
    name: ci (edge drift)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tests/go.mod

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: make ci
        env:
          IMAGES: edge
        run: make ci

      - name: Upload log bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-logs-edge-${{ github.run_id }}
          path: logs/
          retention-days: 7
